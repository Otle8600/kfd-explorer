name: Build Unsigned KFD IPA

on:
  workflow_dispatch: # 保留手動觸發

# 核心修正：明確向 GitHub 申報此任務需要寫入和讀取的最高權限，防止被隱藏
permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # 必須是 v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Xcode Project
        run: |
          xcodebuild clean build \
            -project *.xcodeproj \
            -scheme "kfd-explorer" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r kfd-explorer-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 必須是 v4
        with:
          name: kfd-explorer-ipa-build
          path: kfd-explorer-unsigned.ipa
