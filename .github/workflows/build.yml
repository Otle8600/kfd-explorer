name: Build Unsigned KFD kfund IPA

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Inspect Directory Structure
        run: |
          echo "=== 正在檢查當前倉庫根目錄結構 ==="
          ls -R

      - name: Build Xcode Project
        run: |
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "❌ 錯誤：在整個倉庫中都找不到任何 .xcodeproj 文件！"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          echo "[+] 成功定位項目目錄: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          xcodebuild clean build \
            -project *.xcodeproj \
            -scheme "kfund" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package to IPA with Frida Gadget
        run: |
          mkdir -p Payload
          
          # 1. 定位編譯產物 .app
          APP_PATH=$(find . -name "*.app" -path "*/Release-iphoneos/*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*/Release-iphoneos/*" | head -n 1 2>/dev/null)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 錯誤：找不到編譯生成的 .app 殼！"
            exit 1
          fi
          
          echo "[+] 找到 App 殼: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          
          # 2. 🔥 【核心突破】利用你的真實 Google Drive 檔案 ID 自動物理對齊下載
          echo "[+] 正在從 Google Drive 雲端下載 38MB Frida Dylib..."
          curl -L -k -o frida-gadget-16.1.11.dylib "https://docs.google.com/uc?export=download&id=17yxSIBNGlBXfXL45YHK6_qeGZjggzjNN"
          
          # 3. 物理封裝進 .app 內部
          FRIDA_CONFIG=$(find . -name "frida-gadget-16.1.11.config" | head -n 1)
          
          cp frida-gadget-16.1.11.dylib Payload/*.app/
          if [ -n "$FRIDA_CONFIG" ]; then
            echo "[+] 檢測到本地配置，正在注入 frida 配置文件..."
            cp "$FRIDA_CONFIG" Payload/*.app/
          else
            echo "⚠️ 警告：未在倉庫中找到 .config 檔案，將僅注入 .dylib。"
          fi
          
          zip -r kfund-gadget-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfund-gadget-ipa
          path: kfund-gadget-unsigned.ipa
